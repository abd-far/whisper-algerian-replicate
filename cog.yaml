# Replicate deployment config for Whisper Algerian Dialect model
# Based on MohammedNasri/whisper-algerian-dialect
# To deploy: push this repo to GitHub, then connect to https://replicate.com/create

build:
  gpu: true
  cuda: "12.0"
  python_version: "3.11"
  system_packages:
    - "ffmpeg"
    - "libsndfile1"
  python_packages:
    - "torch==2.0.1"
    - "transformers==4.35.0"
    - "librosa==0.10.0"
    - "soundfile==0.12.1"

predict: "predict.py:Predictor"
