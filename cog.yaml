# Replicate deployment config for Whisper Algerian Dialect model
# Based on MohammedNasri/whisper-algerian-dialect
# Optimized for stability and compatibility

build:
  gpu: true
  cuda: "12.1"
  python_version: "3.10"
  system_packages:
    - "ffmpeg"
    - "libsndfile1"
    - "libopenblas-dev"
  python_packages:
    - "torch==2.1.2"
    - "torchaudio==2.1.2"
    - "transformers==4.37.0"
    - "accelerate>=0.26.0"
    - "librosa==0.10.1"
    - "soundfile==0.12.1"
    - "numpy<2.0"

predict: "predict.py:Predictor"
